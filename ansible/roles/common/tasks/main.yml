---
# Common system configuration tasks
# Security baseline per SOLUTION.md requirements

- name: Update all system packages
  yum:
    name: '*'
    state: latest
    update_cache: yes
  tags: packages

- name: Install required system packages
  yum:
    name:
      - chrony
      - logrotate
      - python3
      - python3-pip
    state: present
  tags: packages

- name: Enable and start chrony for time synchronization
  systemd:
    name: chronyd
    enabled: yes
    state: started
  tags: time

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart sshd
  tags: ssh

- name: Disable SSH root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart sshd
  tags: ssh

- name: Configure logrotate for application logs
  template:
    src: logrotate.conf.j2
    dest: /etc/logrotate.d/rewards
    owner: root
    group: root
    mode: '0644'
  tags: logging
