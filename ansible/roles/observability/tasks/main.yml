---
# Observability configuration
# CloudWatch alarms managed by Terraform

- name: Create application log directory
  file:
    path: "{{ log_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  tags: logging

- name: Create systemd override directory
  file:
    path: "/etc/systemd/system/{{ service_name }}.service.d"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: logging

- name: Configure service log output
  copy:
    content: |
      [Service]
      StandardOutput=append:{{ log_dir }}/health-service.log
      StandardError=append:{{ log_dir }}/health-service.log
    dest: "/etc/systemd/system/{{ service_name }}.service.d/logging.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart rewards-health
  tags: logging
