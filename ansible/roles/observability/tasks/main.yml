---
- name: Create application log directory
  ansible.builtin.file:
    path: "{{ observability_log_dir }}"
    state: directory
    owner: "{{ observability_app_user }}"
    group: "{{ observability_app_group }}"
    mode: '0755'
  tags: logging

- name: Create systemd override directory
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ observability_service_name }}.service.d"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: logging

- name: Configure service log output
  ansible.builtin.copy:
    content: |
      [Service]
      StandardOutput=append:{{ observability_log_dir }}/health-service.log
      StandardError=append:{{ observability_log_dir }}/health-service.log
    dest: "/etc/systemd/system/{{ observability_service_name }}.service.d/logging.conf"
    owner: root
    group: root
    mode: '0644'
  notify: Restart rewards-health
  tags: logging
