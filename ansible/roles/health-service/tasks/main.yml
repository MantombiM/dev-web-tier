---
- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  tags: directory

- name: Deploy secret fetch script
  template:
    src: fetch-secrets.sh.j2
    dest: "{{ app_dir }}/fetch-secrets.sh"
    owner: root
    group: "{{ app_group }}"
    mode: '0750'
  tags: secrets

- name: Deploy health service application
  template:
    src: health-service.py.j2
    dest: "{{ app_dir }}/health-service.py"
    owner: root
    group: "{{ app_group }}"
    mode: '0644'
  tags: application

- name: Deploy systemd service unit
  template:
    src: rewards-health.service.j2
    dest: /etc/systemd/system/{{ service_name }}.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd
  tags: systemd

- name: Flush handlers before service start
  meta: flush_handlers
  tags: service

- name: Enable and start rewards health service
  systemd:
    name: "{{ service_name }}"
    enabled: yes
    state: started
    daemon_reload: yes
  tags: service

- name: Verify service is running
  systemd:
    name: "{{ service_name }}"
    state: started
  register: service_status
  failed_when: service_status.status.ActiveState != 'active'
  tags: verify
