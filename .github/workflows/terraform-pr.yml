name: Terraform PR Quality Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - '.github/workflows/terraform-pr.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: Terraform Validation & Planning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rewards-github-actions-role
          aws-region: us-east-1
          role-session-name: GitHubActions-PR-${{ github.run_id }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform
      
      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: terraform
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      
      - name: Initialize TFLint
        id: tflint_init
        run: tflint --init
        working-directory: terraform
        continue-on-error: true
      
      - name: Run TFLint
        id: tflint
        run: tflint --format compact --recursive
        working-directory: terraform
        continue-on-error: true
      
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/dev.tfvars" \
            -no-color \
            -input=false
        working-directory: terraform
        continue-on-error: true
      
      - name: Comment PR with validation results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated)'
              : planOutput;

            const output = `## Terraform Quality Gates Results

            | Gate | Status |
            |------|--------|
            | Terraform Format | \`${{ steps.fmt.outcome }}\` |
            | Terraform Init | \`${{ steps.init.outcome }}\` |
            | Terraform Validate | \`${{ steps.validate.outcome }}\` |
            | TFLint | \`${{ steps.tflint.outcome }}\` |
            | Terraform Plan | \`${{ steps.plan.outcome }}\` |

            <details><summary>Terraform Plan Output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            **Pushed by:** @${{ github.actor }}
            **Run ID:** ${{ github.run_id }}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
      
      - name: Validate critical checks passed
        if: steps.fmt.outcome != 'success' || steps.validate.outcome != 'success' || steps.init.outcome != 'success' || steps.plan.outcome != 'success'
        run: |
          echo "Critical validation checks failed"
          exit 1
  
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Ansible and ansible-lint
        run: |
          pip install --upgrade pip
          pip install ansible ansible-lint
      
      - name: Run ansible-lint
        run: ansible-lint --force-color
        working-directory: ansible

  security-scan:
    name: Security Scanning (tfsec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: sarif
          additional_args: --minimum-severity MEDIUM
